# Veröffentlicht die statische WERKOS-Website + Browser-Demo auf GitHub Pages.
# Die Server-Version (Multi-Mandanten-SaaS) läuft weiterhin per docker compose
# auf einem eigenen Server — siehe docs/DEPLOYMENT.md.
name: Website auf GitHub Pages

on:
  push:
    branches:
      - main
      - claude/werkos-saas-platform-build-xce3o0
  workflow_dispatch:

permissions:
  contents: write   # publish-root aktualisiert die statischen Dateien im Repo-Root
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Statische Seite bauen
        run: node tools/build-static-site.js
      - name: Pages konfigurieren (aktiviert Pages beim ersten Lauf)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Fallback für den "Deploy from a branch"-Modus: hält die statische Website
  # im Repo-Root von main aktuell (Pages-Quelle main/(root) liefert sie dann aus).
  publish-root:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node tools/build-static-site.js
      - name: Root-Dateien aktualisieren und committen
        run: |
          cp -r dist-static/* .
          cp dist-static/.nojekyll .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll index.html app.html saas.js impressum.html datenschutz.html manifest.webmanifest icons lib
          git diff --cached --quiet || { git commit -m "Statische Website im Root aktualisiert [skip ci]"; git push; }
